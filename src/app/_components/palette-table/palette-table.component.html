<div class="comp-container">
  @if (tonePickerRows().length) {
    <app-tone-picker
      [rows]="tonePickerRows()"
      [columnHeaders]="tonePickerHeaders()"
      [size]="'small'"
      [hideUi]="true"
      [selectedValue]="selectedOklch()"
      [ariaLabel]="'Color tones — hue ' + (dataStruct()[0]?.[0]?.hue?.toFixed(0) ?? '') + '°'"
      (colorSelect)="onTonePickerSelect($event)"
    ></app-tone-picker>
  }
</div>
