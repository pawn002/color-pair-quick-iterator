<label
  [class]="'checkbox-wrapper' + (disabled ? ' checkbox-wrapper--disabled' : '')"
>
  <input
    type="checkbox"
    [id]="checkboxId"
    [name]="name()"
    [checked]="checked"
    [disabled]="disabled"
    [required]="required()"
    class="checkbox-input"
    (change)="onCheckboxChange($event)"
    (blur)="onBlur()"
  />
  <span class="checkbox-box"></span>
  <span class="checkbox-label">{{ label() }}</span>
</label>
