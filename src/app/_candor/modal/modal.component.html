<dialog
  #dialog
  class="modal"
  aria-modal="true"
  [attr.aria-labelledby]="uid"
  (click)="onBackdropClick($event)"
  (close)="open.set(false)"
>
  <div class="modal__panel" (click)="$event.stopPropagation()">
    <div class="modal__header">
      <h2 [id]="uid" class="modal__title">{{ title() }}</h2>
      <app-button variant="ghost" size="icon" ariaLabel="Close dialog" (clicked)="close()">
        <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20">
          <path d="M19 6.41 17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
        </svg>
      </app-button>
    </div>
    <div class="modal__body">
      <ng-content></ng-content>
    </div>
  </div>
</dialog>
